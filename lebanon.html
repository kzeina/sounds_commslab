<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Faiza in Lebanon</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="country.css">
</head>
<body>

<nav>
  <span onclick="window.location.href='kazakhstan.html'">← Kazakhstan</span>
  <span onclick="window.location.href='index.html'">Globe</span>
  <span onclick="window.location.href='uae.html'">UAE →</span>
</nav>

<div class="country-page">
  <div class="country-hero">
    <div class="country-flag">🇱🇧</div>
    <h1>Faiza the Falcon: In Lebanon</h1>
    <p class="country-subtitle">Lebanon</p>
  </div>

  <div class="country-content">
    <div class="country-card">
      <h2>The Story</h2>
      <p>In Lebanon, a chorus of bells and car honks provide a backdrop to lively gatherings between friends and family, where chatter and Arabic pop music from the radio dominate the soundscape.</p>
    </div>

    <div class="country-card">
      <h2>The Sound</h2>
      <audio controls>
        <source src="sounds/lebanon.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>

    <div class="country-card">
      <h2>Gallery</h2>
      <div class="gallery-slider">
        <button class="gallery-btn gallery-prev">&#8249;</button>
        <div class="gallery-track-wrap">
          <div class="gallery-track">
            <img src="pics/lebanon/1.png" alt="Faiza on beach" class="gallery-slide">
            <img src="pics/lebanon/2.png" alt="Faiza on rooftop" class="gallery-slide">
          </div>
        </div>
        <button class="gallery-btn gallery-next">&#8250;</button>
      </div>
    </div>
  </div>

  <div class="country-nav">
    <button onclick="window.location.href='kazakhstan.html'" class="btn-back">← Kazakhstan</button>
    <button onclick="window.location.href='index.html'" class="btn-back">Globe</button>
    <button onclick="window.location.href='uae.html'" class="btn-next">Next: UAE →</button>
  </div>
</div>

<script src="gallery.js"></script>
