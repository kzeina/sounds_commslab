<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Faiza the Falcon</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <span onclick="scrollToSection('home')">Home</span>
  <span onclick="scrollToSection('story')">The Story</span>
  <span onclick="scrollToSection('bts')">Behind The Scenes</span>
  <span onclick="scrollToSection('team')">Team</span>
</nav>

<section id="home">
  <h1>Faiza the Falcon: Around the World</h1>
  <div id="frame">
    <div class="map">
      <button onclick="openCountry(0)">UAE</button>
      <button onclick="openCountry(1)">Taiwan</button>
      <button onclick="openCountry(2)">Kazakhstan</button>
      <button onclick="openCountry(3)">Lebanon</button>
    </div>
  </div>
</section>

<section id="story">
  <h1>THE STORY</h1>
  <div class="split">
    <div class="text">
      <p>Your story text goes here.</p>
    </div>
    <div class="image">Image Placeholder</div>
  </div>
</section>

<section id="bts">
  <h1>Behind The Scenes</h1>
  <div class="grid">
    <div>Image</div>
    <div>Image</div>
    <div>Image</div>
  </div>
</section>

<section id="team">
  <h1>The Creators</h1>
  <div class="team-cards">
    <div class="card">
      <div class="avatar">T</div>
      <h3>Ting-An</h3>
      <p>Role</p>
    </div>
    <div class="card">
      <div class="avatar">A</div>
      <h3>Assemay</h3>
      <p>Role</p>
    </div>
    <div class="card">
      <div class="avatar">Z</div>
      <h3>Zeina</h3>
      <p>Role</p>
    </div>
    <div class="card">
      <div class="avatar">M</div>
      <h3>Maryam</h3>
      <p>Role</p>
    </div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
