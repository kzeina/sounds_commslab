<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Faiza the Falcon</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="//unpkg.com/globe.gl"></script>
</head>

<body>

  <nav>
    <span onclick="scrollToSection('home')">Home</span>
    <span onclick="scrollToSection('story')">The Story</span>
    <span onclick="scrollToSection('bts')">Behind The Scenes</span>
    <span onclick="scrollToSection('team')">Team</span>
  </nav>

  <section id="home">
    <h1>Faiza the Falcon: Around the World</h1>
    <div id="frame">
      <div id="globe-container"></div>
    </div>
  </section>

  <section id="story">
    <h1>THE STORY</h1>
    <div class="split">
      <div class="text">
        <p>Your story text goes here.</p>
      </div>
      <div class="image">Image Placeholder</div>
    </div>
  </section>

<section id="bts">
  <h1>Behind The Scenes</h1>

  <div style="display:flex; justify-content:center;">
    <iframe 
      src="https://drive.google.com/file/d/1agpSvKIZKU9GDagVFYpHwzL7OJlkhvs5/preview"
      width="800"
      height="450"
      allow="autoplay"
      style="border:none; border-radius:12px;">
    </iframe>
  </div>

</section>

  <section id="team">
    <h1>The Creators</h1>
    <div class="team-cards">
      <div class="card">
        <div class="avatar">T</div>
        <h3>Ting-An</h3>
        <p>Role</p>
      </div>
      <div class="card">
        <div class="avatar">A</div>
        <h3>Assemay</h3>
        <p>Role</p>
      </div>
      <div class="card">
        <div class="avatar">Z</div>
        <h3>Zeina</h3>
        <p>Role</p>
      </div>
      <div class="card">
        <div class="avatar">M</div>
        <h3>Maryam</h3>
        <p>Role</p>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>

</html>
